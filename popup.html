<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YT -> Notion</title>
    <style>
        :root { --primary: #ff0000; --bg: #f5f5f5; --text: #333; }
        body { width: 320px; padding: 16px; font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        h2 { margin-top: 0; color: var(--primary); font-size: 18px; }
        .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; }
        input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 8px; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; height: 120px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-top: 8px; box-sizing: border-box; resize: none; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h2>🤖 YT -> Notion</h2>
    
    <div class="card" id="setupCard">
        <label style="font-size: 12px;">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <button id="saveKeyBtn">Save Key</button>
    </div>

    <div class="card hidden" id="mainCard">
        <button id="runBtn">Run AI Magic</button>
        <p id="loading" class="hidden">Loading...</p>
        <textarea id="resultBox" class="hidden" placeholder="Result..."></textarea>
    </div>

    <script src="popup.js"></script>
</body>
</html>
